name: real_estate_crm
description: "Real Estate CRM Mobile Application for Enquiry Management."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management & Dependency Injection
  get: ^4.6.6
  get_storage: ^2.1.1

  # HTTP & API
  dio: ^5.3.1
  connectivity_plus: ^5.0.1

  # Local Storage
  shared_preferences: ^2.2.2
  local_auth: ^2.1.1

  # UI & Utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  permission_handler: ^12.0.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
